const DEFAULT_DATA={
  site:{name:"The Public Innovation Institute",email:"info@thepii.org",tagline:"Working at the intersection of technology, public policy, and community leadership.",address:"1 Washington Mall, Suite 1159\nGovernment Center, Boston, MA 02108",twitter:"@thepii_org",pullQuote:'"The world doesn\'t move in straight lines. A child\'s health is shaped by the air they breathe, the school they attend, the code behind a distant algorithm."'},
  stats:[{num:"10",unit:"M",desc:"People die annually from pollution-related causes — 1 in 6 global deaths"},{num:"14",unit:"×",desc:"Return on every $1 invested in public health infrastructure"},{num:"77",unit:"%",desc:"Of jobs will require digital skills by 2030, up from 50% today"},{num:"97",unit:"M",desc:"New jobs AI is expected to create as it simultaneously displaces others"}],
  carousel:[
    {id:1,tag:"Research · Harvard Bloomberg Center",title:"AI-Enabled Infrastructure Monitoring as a Public Health Intervention",sub:"A new framework for cities to transform infrastructure monitoring into actionable public health strategy.",link:"research/ai-infrastructure-monitoring",status:"active"},
    {id:2,tag:"Working Paper · Urban Analytics",title:"Can AI Address Equity Gaps in Urban Health Surveillance?",sub:"Evidence from Boston's 311 system and AI-detected pavement data reveals new fault lines in civic participation.",link:"research/equity-gaps-urban-health",status:"active"},
    {id:3,tag:"Program · Applications Close June 22",title:"PII × Cyvl.AI 2026 Summer Innovation Program",sub:"Six weeks at the intersection of AI, infrastructure data, and urban policy. Fully virtual.",link:"programs/piixcyvl-2026",status:"active"}
  ],
  research:[
    {id:"ai-infrastructure-monitoring",title:"A Framework for Using AI-Enabled Infrastructure Monitoring as a Public Health Intervention",author:"Khahlil Louisy",affiliation:"Harvard Bloomberg Center",tag:"Data-Smart City Solutions",status:"published",date:"June 9, 2026",excerpt:"A method for cities to transform infrastructure monitoring into actionable public health strategy, prioritizing repairs where they're needed most while reducing health disparities.",body:"Cities face a growing tension: aging infrastructure and limited budgets demand triage, yet the systems we use to prioritize repairs often reflect who complains rather than who suffers most.\n\n**Stage 1: Multi-modal data fusion.** Integrate 311 complaint data, computer vision pavement assessments, environmental sensor readings, and health outcome data by census tract.\n\n**Stage 2: Equity-weighted prioritization.** Standard infrastructure triage weights severity of damage. This framework adds a second axis: the health vulnerability of the population affected.\n\n**Stage 3: Feedback loop design.** Deploy repair crews with structured outcome-collection protocols. Track whether completed repairs correlate with measurable changes in emergency department utilization.\n\n**Stage 4: Continuous calibration.** Use the feedback data to retrain prioritization models quarterly, improving the correlation between AI-detected issues and health impact over time.\n\nPilot data from Boston suggests that applying this framework could shift roughly 22% of annual infrastructure repair spending toward historically underserved neighborhoods — without increasing total expenditure.",featured:true},
    {id:"equity-gaps-urban-health",title:"Can AI Address Equity Gaps in Urban Health Surveillance? Evidence from Boston",author:"Khahlil Louisy",affiliation:"Working Paper",tag:"Urban Analytics",status:"published",date:"June 5, 2026",excerpt:"Boston's 311 complaint system vs. AI-detected pavement data reveals how complaint-based systems reflect socioeconomic patterns of participation.",body:"Urban health surveillance systems in the United States rely heavily on voluntary citizen reporting. The 311 non-emergency service request system is the primary mechanism by which residents signal infrastructure problems to government. But who reports, and who doesn't, is not random.\n\nThis paper examines 187,408 pavement-related 311 service requests filed in Boston between 2021 and 2024, cross-referencing them against 5,341 computer vision detections of pavement degradation generated by the Cyvl.AI platform. The overlap is 7.9%.\n\n**Key finding:** The 92.1% of AI-detected issues not captured by 311 reports are disproportionately concentrated in neighborhoods with lower median incomes, higher proportions of non-English-speaking residents, and higher rates of chronic disease.\n\nAI-based detection offers a pathway to complaint-independent surveillance. But deploying AI detection without addressing the equity question in prioritization simply replaces one biased input with a more efficient one.",featured:true},
    {id:"residents-vs-algorithms",title:"When Residents and Algorithms See Different Problems",author:"Khahlil Louisy",affiliation:"The Public Innovation Institute",tag:"Infrastructure Equity",status:"published",date:"May 28, 2026",excerpt:"Analysis of 187,000 citizen reports and 5,000 computer vision detections in Boston raises critical questions about who gets heard in civic data systems.",body:"When a pothole appears on a Boston street, two things may or may not happen: a resident may file a 311 report, and a computer vision system may detect it. These two detection events are far less correlated than city planners assume.\n\nThis analysis maps the spatial and demographic patterns of the gap between resident-reported and algorithmically-detected pavement issues across Boston's 23 neighborhoods.\n\nThe divergence matters because cities typically use 311 data as one input into maintenance scheduling. If the AI detection layer is added as a supplement rather than a correction, the equity gap may actually widen.\n\nThe paper concludes with three design recommendations: (1) treat AI detection as a bias-correcting input, not a neutral supplement; (2) publish equity audits of repair allocation annually; (3) create community feedback mechanisms.",featured:true},
    {id:"transportation-safety-build-act",title:"The BUILD America 250 Act: A Missed Opportunity for Safety-First Infrastructure",author:"Khahlil Louisy, Eric Plosky, Giovanni Pintor",affiliation:"Issues in Science and Technology",tag:"Policy Brief",status:"published",date:"April 2026",excerpt:"A critical analysis of the BUILD America 250 Act's transportation safety provisions and what a performance-based alternative would look like.",body:"The BUILD America 250 Act represents the largest single federal infrastructure investment since 2021. Yet its transportation safety provisions repeat the same structural mistakes that have kept American road fatality rates among the highest in the developed world.\n\nThis article argues that the Act's safety provisions are process-oriented rather than outcome-oriented. They require states to develop safety plans and report on activities. They do not require measurable reductions in fatalities as a condition of continued funding.\n\nWe propose a Vision Zero federal funding mechanism that ties a portion of highway formula funding to verified reductions in fatality rates.",featured:false}
  ],
  programs:[
    {id:"piixcyvl-2026",name:"PII × Cyvl.AI 2026 Summer Innovation Program",level:"Featured",format:"Fully virtual · 6 weeks",status:"open",deadline:"June 22, 2026",applyUrl:"#",featured:true,description:"Six weeks of hands-on work at the intersection of AI, infrastructure data, and urban policy. A select cohort of students and recent grads tackle real city challenges with real datasets.",fullDescription:"The PII × Cyvl.AI Summer Innovation Program is a six-week intensive for students and recent graduates who want to work at the frontier of AI and urban infrastructure.\n\nParticipants will work directly with Cyvl.AI's computer vision infrastructure dataset alongside public health data, 311 records, and municipal budget data from partner cities.\n\n**What you'll do:**\n- Work in small teams on a defined research or policy question\n- Learn applied data analysis, geospatial methods, and policy communication\n- Present findings to city officials, researchers, and practitioners\n- Receive mentorship from The PII's research team and Cyvl.AI engineers\n\n**Timeline:**\n- Applications close: June 22, 2026\n- Program runs: July 7 – August 15, 2026\n- Final showcase: August 14, 2026"},
    {id:"data-social-innovation",name:"Data, Social Innovation & Public Policy",level:"Graduate",format:"Summer intensive",status:"open",deadline:"TBD",applyUrl:"#",featured:false,description:"Rigorous training for graduate students and practitioners at the intersection of data science and public policy reform.",fullDescription:"This graduate-level program prepares students to work at the intersection of data science and public policy. Over six weeks, participants develop applied skills in data analysis, policy design, and stakeholder communication.\n\nThe program draws faculty from Harvard Kennedy School, MIT, and The PII's research network."},
    {id:"data-analytics-urban-policy",name:"Data Analytics & Urban Policy",level:"Undergraduate",format:"Fully virtual · 6 weeks",status:"open",deadline:"TBD",applyUrl:"#",featured:false,description:"Hands-on training in urban data analytics with direct application to real city challenges and municipal data infrastructure.",fullDescription:"Designed for undergraduate students interested in how cities work and how data can make them work better. This program covers the fundamentals of urban data — what cities collect, how it's structured, and how to analyze it.\n\nNo prior programming experience required. Students leave with practical skills in Python, data visualization, and policy brief writing."},
    {id:"tech-innovation-entrepreneurship",name:"Technology, Innovation & Entrepreneurship",level:"High School",format:"Summer · In-person",status:"open",deadline:"TBD",applyUrl:"#",featured:false,description:"An immersive introduction to civic technology and public entrepreneurship for exceptional high school students aged 15–18.",fullDescription:"A two-week residential program for high school students who want to understand how technology shapes cities and communities.\n\nStudents learn design thinking, basic coding, and the fundamentals of building for public good. Each cohort completes a civic technology prototype by the end of the program."}
  ],
  focusAreas:[
    {id:1,title:"Responsible AI in Government",body:"Designing AI systems that municipal governments can deploy equitably — building transparency and accountability into public-sector AI from the ground up."},
    {id:2,title:"Health Systems & Population Health",body:"Mapping social and physical determinants of health and translating evidence into interventions that close disparity gaps."},
    {id:3,title:"Civic & Digital Infrastructure",body:"Building open, interoperable data systems that power evidence-based governance — from 311 analytics to real-time sensor networks."},
    {id:4,title:"Economic Development & Digital Transformation",body:"Connecting digital capability to inclusive economic growth — from workforce digitization to municipal innovation ecosystems."},
    {id:5,title:"Climate & Resilient Ecosystems",body:"Connecting climate data to municipal planning, infrastructure investment, and community preparedness."},
    {id:6,title:"Workforce & Education Innovation",body:"Preparing a new generation of civic technologists through rigorous programs that bridge data science, policy design, and practical governance."},
    {id:7,title:"Public-Interest Innovation & Venture Building",body:"Accelerating early-stage ventures that harness technology for the common good via the Hyperion program."}
  ],
  hyperion:{tagline:"Venture Development Program",body:"Hyperion provides intensive support for early-stage ventures combining cutting-edge technology with deep understanding of complex social systems.",cta:"Apply to Hyperion",pillars:[{num:"01",title:"Embedded Research Support",body:"Institutional partnerships across MIT, Harvard, and beyond."},{num:"02",title:"Founder Community",body:"A curated cohort of founders tackling public problems with bold ideas."},{num:"03",title:"Procurement Pathways",body:"Access to policymakers, pilots, and government procurement channels."},{num:"04",title:"Capital & Advisor Network",body:"Warm introductions to impact investors and philanthropies."}],partners:[{name:"JP Morgan",type:"Financial Partner",color:"#003087"},{name:"Fusion Fund",type:"Venture Partner",color:"#0e0e0c"},{name:"Orrick",type:"Legal Partner",color:"#1a1a1a"},{name:"MIT",type:"Academic Partner",color:"#A31F34"},{name:"City of San José",type:"Government Partner",color:"#0D4F8B"},{name:"City of Baltimore",type:"Government Partner",color:"#002147"}]},
  conference:{year:"2026",date:"May 2026",location:"New York City",theme:"Urban.Next: Inventing the Future of Urban Systems",subtitle:"The conference on public-interest innovation and invention. Bringing together researchers, city leaders, technologists, and civic entrepreneurs.",regUrl:"#",tracks:[{name:"The Summit",desc:"Plenaries, keynotes, and provocations from the field's leading voices"},{name:"The Workshops",desc:"Hands-on sessions co-designed with city innovators and practitioners"}]}
};

function loadData(){
  try{const raw=localStorage.getItem(STORAGE_KEY);if(raw){const p=JSON.parse(raw);return{...DEFAULT_DATA,...p,research:p.research||DEFAULT_DATA.research,programs:p.programs||DEFAULT_DATA.programs,carousel:p.carousel||DEFAULT_DATA.carousel,hyperion:{...DEFAULT_DATA.hyperion,...(p.hyperion||{})},site:{...DEFAULT_DATA.site,...(p.site||{})}};}}catch(e){}return DEFAULT_DATA;
}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch(e){}}
function loadSession(){try{const r=localStorage.getItem(SESSION_KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function saveSession(s){try{localStorage.setItem(SESSION_KEY,JSON.stringify(s));}catch(e){}}
function clearSession(){try{localStorage.removeItem(SESSION_KEY);}catch(e){}}

const btn=(extra={})=>({background:INK,color:"#fff",border:"none",padding:"11px 22px",fontFamily:SANS,fontSize:12,fontWeight:500,letterSpacing:"0.06em",textTransform:"uppercase",cursor:"pointer",...extra});
const btnGhost=(extra={})=>({background:"#fff",color:INK,border:`1px solid ${RULE}`,padding:"9px 18px",fontFamily:SANS,fontSize:12,fontWeight:500,letterSpacing:"0.06em",textTransform:"uppercase",cursor:"pointer",...extra});

function CMSLogin({onLogin}){
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState(false);
  const attempt=()=>{
    if(email===SUPERADMIN.email&&pw===SUPERADMIN.password){setErr(false);onLogin();}
    else setErr(true);
  };
  return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:PAPER,fontFamily:SANS}},
    h("div",{style:{width:380,background:"#fff",border:`1px solid ${RULE}`,padding:"2.5rem"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:"2rem"}},
        h("div",{style:{width:32,height:32,background:INK,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}},
          h("svg",{viewBox:"0 0 20 20",width:14,height:14},
            h("circle",{cx:10,cy:10,r:2.5,fill:"white"}),
            h("line",{x1:10,y1:3,x2:10,y2:6.5,stroke:"white",strokeWidth:1.5,strokeLinecap:"round"}),
            h("line",{x1:10,y1:13.5,x2:10,y2:17,stroke:"white",strokeWidth:1.5,strokeLinecap:"round"}),
            h("line",{x1:3,y1:10,x2:6.5,y2:10,stroke:"white",strokeWidth:1.5,strokeLinecap:"round"}),
            h("line",{x1:13.5,y1:10,x2:17,y2:10,stroke:"white",strokeWidth:1.5,strokeLinecap:"round"})
          )
        ),
        h("div",null,
          h("div",{style:{fontFamily:SERIF,fontSize:14,fontWeight:700,color:INK}},"PII CMS"),
          h("div",{style:{fontSize:10,color:"#7a7a72",letterSpacing:"0.06em",textTransform:"uppercase"}},"Content Management System")
        )
      ),
      h("div",{style:{fontFamily:SERIF,fontSize:"1.5rem",fontWeight:700,marginBottom:"0.4rem"}},"Sign in"),
      h("div",{style:{fontSize:12,color:"#7a7a72",marginBottom:"2rem"}},"Authorized personnel only"),
      h("div",{style:{marginBottom:"1.2rem"}},
        h("label",{style:{display:"block",fontSize:11,fontWeight:500,letterSpacing:"0.06em",textTransform:"uppercase",color:"#3a3a36",marginBottom:"0.5rem"}},"Email"),
        h("input",{type:"email",value:email,onChange:e=>setEmail(e.target.value),onKeyDown:e=>e.key==="Enter"&&attempt(),style:{width:"100%",padding:"10px 12px",border:`1px solid ${err?ACCENT:RULE}`,background:"#fff",fontFamily:SANS,fontSize:14,color:INK,outline:"none",boxSizing:"border-box"}})
      ),
      h("div",{style:{marginBottom:"1.2rem"}},
        h("label",{style:{display:"block",fontSize:11,fontWeight:500,letterSpacing:"0.06em",textTransform:"uppercase",color:"#3a3a36",marginBottom:"0.5rem"}},"Password"),
        h("input",{type:"password",value:pw,onChange:e=>setPw(e.target.value),onKeyDown:e=>e.key==="Enter"&&attempt(),style:{width:"100%",padding:"10px 12px",border:`1px solid ${err?ACCENT:RULE}`,background:"#fff",fontFamily:SANS,fontSize:14,color:INK,outline:"none",boxSizing:"border-box"}})
      ),
      h("button",{onClick:attempt,style:{...btn(),width:"100%",textAlign:"center"}},"Sign In →"),
      err&&h("div",{style:{marginTop:"1rem",background:"#fff0ed",border:"1px solid rgba(200,64,30,0.3)",color:ACCENT,fontSize:12,padding:"10px 12px"}},"Incorrect email or password.")
    )
  );
}

function CMSShell({data,setData,onLogout}){
  const [pg,setPg]=useState("dashboard");
  const [toast,setToast]=useState("");
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};
  const save=nd=>{setData(nd);saveData(nd);showToast("Saved ✓");};

  const navItems=[
    {s:"Overview",items:[{id:"dashboard",label:"Dashboard"}]},
    {s:"Content",items:[{id:"cms-research",label:"Research"},{id:"cms-programs",label:"Programs"},{id:"cms-carousel",label:"Carousel"},{id:"cms-hyperion",label:"Hyperion"},{id:"cms-conference",label:"Change.Enabled"}]},
    {s:"Site",items:[{id:"cms-focus",label:"Focus Areas"},{id:"cms-stats",label:"Impact Stats"},{id:"cms-settings",label:"Settings"}]}
  ];

  const FieldRow=({label,val,onCh,type="text",rows})=>h("div",{style:{marginBottom:"1rem"}},
    h("label",{style:{display:"block",fontSize:11,fontWeight:500,letterSpacing:"0.06em",textTransform:"uppercase",color:"#3a3a36",marginBottom:"0.4rem"}},label),
    rows?h("textarea",{value:val||"",onChange:onCh,rows,style:{width:"100%",padding:"9px 12px",border:`1px solid ${RULE}`,fontFamily:SANS,fontSize:13,resize:"vertical",boxSizing:"border-box"}}):
    h("input",{type,value:val||"",onChange:onCh,style:{width:"100%",padding:"9px 12px",border:`1px solid ${RULE}`,fontFamily:SANS,fontSize:13,boxSizing:"border-box"}})
  );

  return h("div",{style:{display:"flex",flexDirection:"column",minHeight:"100vh",fontFamily:SANS}},
    h("div",{style:{height:52,background:"#fff",borderBottom:`1px solid ${RULE}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1.5rem",position:"sticky",top:0,zIndex:50}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10}},
        h("span",{style:{fontFamily:SERIF,fontSize:13,fontWeight:700}},"PII CMS"),
        h("span",{style:{color:RULE,margin:"0 6px"}},"|"),
        h("span",{style:{fontSize:12,color:"#7a7a72"}},"Superadmin · Khahlil Louisy")
      ),
      h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
        h("a",{href:"index.html",style:{...btnGhost(),fontSize:11,padding:"6px 12px",textDecoration:"none"}},"← View Site"),
        h("button",{onClick:onLogout,style:{...btnGhost(),fontSize:11,padding:"6px 12px"}},"Sign out")
      )
    ),
    h("div",{style:{display:"flex",flex:1}},
      h("div",{style:{width:190,background:"#fff",borderRight:`1px solid ${RULE}`,padding:"1rem 0",flexShrink:0}},
        navItems.map(({s,items})=>h("div",{key:s},
          h("div",{style:{fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:"#7a7a72",padding:"0 1rem",margin:"1rem 0 0.4rem"}},s),
          items.map(({id,label})=>h("div",{key:id,onClick:()=>setPg(id),style:{padding:"7px 1rem",fontSize:13,color:pg===id?ACCENT:"#3a3a36",cursor:"pointer",background:pg===id?"#f5ede9":"transparent",borderLeft:`2px solid ${pg===id?ACCENT:"transparent"}`,fontWeight:pg===id?500:400}},label))
        ))
      ),
      h("div",{style:{flex:1,padding:"2rem",overflow:"auto",maxWidth:"100%"}},

        pg==="dashboard"&&h("div",null,
          h("div",{style:{fontFamily:SERIF,fontSize:"1.6rem",fontWeight:700,marginBottom:"0.5rem"}},"Dashboard"),
          h("div",{style:{fontSize:12,color:"#7a7a72",marginBottom:"2rem"}},"Welcome back, Khahlil. Here's your overview."),
          h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"1rem",marginBottom:"2rem"}},
            [["Published",data.research.filter(r=>r.status==="published").length,"publications"],["Programs",data.programs.length,"active"],["Carousel",data.carousel.filter(c=>c.status==="active").length,"slides"],["Partners",data.hyperion.partners.length,"in network"]].map(([l,n,s])=>
              h("div",{key:l,style:{background:"#fff",border:`1px solid ${RULE}`,padding:"1.25rem"}},
                h("div",{style:{fontSize:11,letterSpacing:"0.06em",textTransform:"uppercase",color:"#7a7a72",marginBottom:"0.5rem"}},l),
                h("div",{style:{fontFamily:SERIF,fontSize:"2rem",fontWeight:700,color:INK,lineHeight:1}},n),
                h("div",{style:{fontSize:11,color:"#7a7a72",marginTop:"0.4rem"}},s)
              )
            )
          ),
          h("div",{style:{background:"#fff",border:`1px solid ${RULE}`}},
            h("div",{style:{padding:"1rem 1.25rem",borderBottom:`1px solid ${RULE}`,fontSize:12,fontWeight:500,letterSpacing:"0.05em",textTransform:"uppercase",color:"#3a3a36"}},"Recent Publications"),
            data.research.slice(0,4).map(r=>h("div",{key:r.id,style:{padding:"0.85rem 1.25rem",borderBottom:`1px solid ${RULE}`,display:"flex",justifyContent:"space-between",alignItems:"center"}},
              h("div",{style:{fontSize:13,color:INK,maxWidth:320}},r.title.length>60?r.title.slice(0,60)+"…":r.title),
              h("span",{style:{fontSize:10,letterSpacing:"0.06em",textTransform:"uppercase",padding:"3px 8px",background:r.status==="published"?"rgba(15,110,86,0.1)":"rgba(136,135,128,0.12)",color:r.status==="published"?"#0F6E56":"#5F5E5A"}},r.status)
            ))
          )
        ),

        pg==="cms-research"&&h("div",null,
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"2rem",paddingBottom:"1.5rem",borderBottom:`1px solid ${RULE}`}},
            h("div",null,h("div",{style:{fontFamily:SERIF,fontSize:"1.6rem",fontWeight:700}},"Research"),h("div",{style:{fontSize:12,color:"#7a7a72"}},"Manage all publications")),
            h("button",{onClick:()=>{const id=`post-${Date.now()}`;const np={id,title:"New Post",author:"Khahlil Louisy",affiliation:"The PII",tag:"Working Paper",status:"draft",date:"",excerpt:"",body:"",featured:false};save({...data,research:[...data.research,np]});},style:{...btn(),fontSize:11,padding:"8px 16px"}},"+ New Post")
          ),
          h("div",{style:{background:"#fff",border:`1px solid ${RULE}`}},
            h("table",{style:{width:"100%",borderCollapse:"collapse"}},
              h("thead",null,h("tr",{style:{background:WARM}},["Title","Author","Tag","Status","Featured",""].map(col=>h("th",{key:col,style:{padding:"10px 1.25rem",textAlign:"left",fontSize:11,letterSpacing:"0.06em",textTransform:"uppercase",color:"#7a7a72",borderBottom:`1px solid ${RULE}`,fontWeight:500}},col)))),
              h("tbody",null,data.research.map(r=>h("tr",{key:r.id,style:{borderBottom:`1px solid ${RULE}`}},
                h("td",{style:{padding:"10px 1.25rem",fontSize:13,fontWeight:500,maxWidth:220}},r.title.length>40?r.title.slice(0,40)+"…":r.title),
                h("td",{style:{padding:"10px 1.25rem",fontSize:12,color:"#7a7a72"}},r.author.split(",")[0]),
                h("td",{style:{padding:"10px 1.25rem"}},h("span",{style:{fontSize:10,padding:"3px 8px",background:"#f5ede9",color:ACCENT,fontWeight:500}},r.tag)),
                h("td",{style:{padding:"10px 1.25rem"}},h("select",{value:r.status,onChange:e=>{save({...data,research:data.research.map(x=>x.id===r.id?{...x,status:e.target.value}:x)});},style:{fontSize:12,border:`1px solid ${RULE}`,padding:"3px 6px",fontFamily:SANS}},h("option",{value:"draft"},"draft"),h("option",{value:"published"},"published"))),
                h("td",{style:{padding:"10px 1.25rem"}},h("input",{type:"checkbox",checked:!!r.featured,onChange:e=>{save({...data,research:data.research.map(x=>x.id===r.id?{...x,featured:e.target.checked}:x)});}})),
                h("td",{style:{padding:"10px 1.25rem"}},h("button",{onClick:()=>{if(confirm("Delete this post?"))save({...data,research:data.research.filter(x=>x.id!==r.id)});},style:{background:"#fff",border:"1px solid rgba(200,64,30,0.3)",color:ACCENT,fontSize:11,padding:"4px 9px",cursor:"pointer"}},"Delete"))
              )))
            )
          ),
          h("div",{style:{marginTop:"2rem",background:"#fff",border:`1px solid ${RULE}`,padding:"1.5rem"}}),
          // Inline editor for new/draft posts
          h("div",{style:{marginTop:"1.5rem"}},
            h("div",{style:{fontSize:12,color:"#7a7a72",fontFamily:MONO}},"Click a post title to edit inline (coming soon — for now use the fields below each row).")
          )
        ),

        pg==="cms-programs"&&h("div",null,
          h("div",{style:{fontFamily:SERIF,fontSize:"1.6rem",fontWeight:700,marginBottom:"0.5rem"}},"Programs"),
          h("div",{style:{fontSize:12,color:"#7a7a72",marginBottom:"2rem"}},"Manage all academic programs"),

                h("td",{style:{padding:"10px 1.25rem"}},h("input",{type:"checkbox",checked:!!p.featured,onChange:e=>{save({...data,programs:data.programs.map(x=>x.id===p.id?{...x,featured:e.target.checked}:x)});}})),
                h("td",{style:{padding:"10px 1.25rem"}},h("button",{onClick:()=>{if(confirm("Delete?"))save({...data,programs:data.programs.filter(x=>x.id!==p.id)});},style:{background:"#fff",border:"1px solid rgba(200,64,30,0.3)",color:ACCENT,fontSize:11,padding:"4px 9px",cursor:"pointer"}},"Delete"))

        pg==="cms-carousel"&&h("div",null,

            )
          )),
          h("button",{onClick:()=>save({...data,carousel:[...data.carousel,{id:Date.now(),tag:"",title:"",sub:"",link:"/",status:"active"}]}),style:{...btnGhost(),fontSize:11,padding:"9px 18px"}},"+ Add Slide")

        pg==="cms-hyperion"&&h("div",null,
          h("div",{style:{fontFamily:SERIF,fontSize:"1.6rem",fontWeight:700,marginBottom:"0.5rem"}},"Hyperion"),

          h("div",{style:{background:"#fff",border:`1px solid ${RULE}`,padding:"1.5rem",marginBottom:"1.5rem"}},
            h("div",{style:{fontSize:12,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.05em",color:"#3a3a36",marginBottom:"1rem",paddingBottom:"0.75rem",borderBottom:`1px solid ${RULE}`}},"Program Copy"),
            h(FieldRow,{label:"Tagline",val:data.hyperion.tagline,onCh:e=>save({...data,hyperion:{...data.hyperion,tagline:e.target.value}})}),
            h(FieldRow,{label:"Body",val:data.hyperion.body,onCh:e=>save({...data,hyperion:{...data.hyperion,body:e.target.value}}),rows:4}),
            h(FieldRow,{label:"CTA Button",val:data.hyperion.cta,onCh:e=>save({...data,hyperion:{...data.hyperion,cta:e.target.value}})})
          ),
          h("div",{style:{background:"#fff",border:`1px solid ${RULE}`,padding:"1.5rem"}},
            h("div",{style:{fontSize:12,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.05em",color:"#3a3a36",marginBottom:"1rem",paddingBottom:"0.75rem",borderBottom:`1px solid ${RULE}`}},"Network Partners"),
            data.hyperion.partners.map((p,i)=>h("div",{key:i,style:{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:"0.75rem",marginBottom:"0.75rem",alignItems:"center"}},
              h("input",{value:p.name,onChange:e=>save({...data,hyperion:{...data.hyperion,partners:data.hyperion.partners.map((x,j)=>j===i?{...x,name:e.target.value}:x)}}),placeholder:"Partner name",style:{padding:"8px 10px",border:`1px solid ${RULE}`,fontFamily:SANS,fontSize:13}}),
              h("input",{value:p.type,onChange:e=>save({...data,hyperion:{...data.hyperion,partners:data.hyperion.partners.map((x,j)=>j===i?{...x,type:e.target.value}:x)}}),placeholder:"Type",style:{padding:"8px 10px",border:`1px solid ${RULE}`,fontFamily:SANS,fontSize:13}}),
              h("button",{onClick:()=>save({...data,hyperion:{...data.hyperion,partners:data.hyperion.partners.filter((_,j)=>j!==i)}}),style:{background:"#fff",border:"1px solid rgba(200,64,30,0.3)",color:ACCENT,fontSize:11,padding:"6px 10px",cursor:"pointer"}},"Remove")
            )),
            h("button",{onClick:()=>save({...data,hyperion:{...data.hyperion,partners:[...data.hyperion.partners,{name:"",type:"",color:"#0e0e0c"}]}}),style:{...btnGhost(),fontSize:11,padding:"7px 14px",marginTop:"0.5rem"}},"+ Add Partner")
          )
        ),

        pg==="cms-conference"&&h("div",null,
          h("div",{style:{fontFamily:SERIF,fontSize:"1.6rem",fontWeight:700,marginBottom:"0.5rem"}},"Change.Enabled"),
          h("div",{style:{fontSize:12,color:"#7a7a72",marginBottom:"2rem"}},"Annual conference settings"),
          h("div",{style:{background:"#fff",border:`1px solid ${RULE}`,padding:"1.5rem"}},
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}},
              [["Year","year"],["Date","date"],["Location","location"],["Reg URL","regUrl"]].map(([lbl,key])=>
                h(FieldRow,{key,label:lbl,val:data.conference[key],onCh:e=>save({...data,conference:{...data.conference,[key]:e.target.value}})})
              )
            ),
            h(FieldRow,{label:"Theme",val:data.conference.theme,onCh:e=>save({...data,conference:{...data.conference,theme:e.target.value}})}),
            h(FieldRow,{label:"Subtitle",val:data.conference.subtitle,onCh:e=>save({...data,conference:{...data.conference,subtitle:e.target.value}}),rows:3})
          )
        ),

        pg==="cms-focus"&&h("div",null,
          h("div",{style:{fontFamily:SERIF,fontSize:"1.6rem",fontWeight:700,marginBottom:"0.5rem"}},"Focus Areas"),

          data.focusAreas.map((fa,i)=>h("div",{key:fa.id,style:{background:"#fff",border:`1px solid ${RULE}`,padding:"1.25rem",marginBottom:"0.75rem",display:"grid",gridTemplateColumns:"auto 1fr",gap:"1rem"}},
            h("span",{style:{fontFamily:MONO,fontSize:12,color:ACCENT,paddingTop:2,minWidth:24}},`0${fa.id}`),
            h("div",null,
              h(FieldRow,{label:"Title",val:fa.title,onCh:e=>save({...data,focusAreas:data.focusAreas.map((x,j)=>j===i?{...x,title:e.target.value}:x)})}),
              h(FieldRow,{label:"Description",val:fa.body,onCh:e=>save({...data,focusAreas:data.focusAreas.map((x,j)=>j===i?{...x,body:e.target.value}:x)}),rows:3})

        pg==="cms-stats"&&h("div",null,

          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem"}},
            data.stats.map((s,i)=>h("div",{key:i,style:{background:"#fff",border:`1px solid ${RULE}`,padding:"1.5rem"}},
              h("div",{style:{fontSize:12,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.05em",color:"#3a3a36",marginBottom:"1rem",paddingBottom:"0.75rem",borderBottom:`1px solid ${RULE}`}},`Stat ${i+1}`),
              h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.75rem"}},
                h(FieldRow,{label:"Number",val:s.num,onCh:e=>save({...data,stats:data.stats.map((x,j)=>j===i?{...x,num:e.target.value}:x)})}),

        pg==="cms-settings"&&h("div",null,
          h("div",{style:{fontFamily:SERIF,fontSize:"1.6rem",fontWeight:700,marginBottom:"0.5rem"}},"Settings"),

          h("div",{style:{background:"#fff",border:`1px solid ${RULE}`,padding:"1.5rem",marginBottom:"1.5rem"}},
            h("div",{style:{fontSize:12,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.05em",color:"#3a3a36",marginBottom:"1rem",paddingBottom:"0.75rem",borderBottom:`1px solid ${RULE}`}},"Site Identity"),

              [["Organization Name","name"],["Contact Email","email"],["Twitter","twitter"]].map(([lbl,key])=>

              )
            ),

            h(FieldRow,{label:"Homepage Pull Quote",val:data.site.pullQuote,onCh:e=>save({...data,site:{...data.site,pullQuote:e.target.value}}),rows:3})
          ),
          h("div",{style:{background:"#fff0ed",border:"1px solid rgba(200,64,30,0.2)",padding:"1.25rem"}},
            h("div",{style:{fontSize:11,fontWeight:500,color:ACCENT,marginBottom:"0.4rem",textTransform:"uppercase",letterSpacing:"0.06em"}},"Export / Import"),
            h("div",{style:{fontSize:12,color:"#3a3a36",marginBottom:"1rem"}},"Download your content as JSON for backup, or paste to restore."),
            h("div",{style:{display:"flex",gap:"0.75rem"}},
              h("button",{onClick:()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="pii_content.json";a.click();},style:{...btn({background:ACCENT,fontSize:11,padding:"8px 16px"})},"Download JSON"),
              h("button",{onClick:()=>{const json=prompt("Paste JSON content:");if(json){try{const parsed=JSON.parse(json);save({...DEFAULT_DATA,...parsed});alert("Content restored.");}catch(e){alert("Invalid JSON.");}}},style:{...btnGhost({fontSize:11,padding:"8px 16px"})},"Import JSON")
            )
          )
        )

      )
    ),
    toast&&h("div",{style:{position:"fixed",bottom:"1.5rem",right:"1.5rem",background:INK,color:"#fff",padding:"12px 20px",fontSize:13,fontWeight:500,zIndex:999}},toast)
  );
}

function App(){
  const [data,setData]=useState(()=>loadData());
  const [session,setSession]=useState(()=>loadSession());

  const handleLogin=()=>{saveSession({email:SUPERADMIN.email});setSession({email:SUPERADMIN.email});};
  const handleLogout=()=>{clearSession();setSession(null);};

  if(!session)return h(CMSLogin,{onLogin:handleLogin});
  return h(CMSShell,{data,setData,onLogout:handleLogout});
}

ReactDOM.createRoot(document.getElementById("cms-root")).render(h(App));
</script>
