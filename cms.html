<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#faf9f5;color:#0e0e0c}
input,textarea,select{font-family:inherit;font-size:13px;width:100%;padding:9px 12px;border:1px solid rgba(14,14,12,0.12);background:#fff;color:#0e0e0c;outline:none}
textarea{resize:vertical}
button{font-family:inherit;cursor:pointer}
.btn{background:#0e0e0c;color:#fff;border:none;padding:10px 20px;font-size:12px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase}
.btn-ghost{background:#fff;color:#0e0e0c;border:1px solid rgba(14,14,12,0.12);padding:8px 16px;font-size:12px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase}
.btn-danger{background:#fff;color:#c8401e;border:1px solid rgba(200,64,30,0.3);padding:5px 10px;font-size:11px}
label{display:block;font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:#3a3a36;margin-bottom:4px}
.field{margin-bottom:14px}
.tag{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#c8401e;font-weight:500}
h1{font-family:'Playfair Display',Georgia,serif;font-size:1.6rem;font-weight:700}
.card{background:#fff;border:1px solid rgba(14,14,12,0.12);padding:1.5rem;margin-bottom:1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:#fff;border:1px solid rgba(14,14,12,0.12);padding:1.25rem}
.stat-num{font-family:'Playfair Display',Georgia,serif;font-size:2rem;font-weight:700;line-height:1}
.stat-label{font-size:11px;color:#7a7a72;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:.5rem}
.stat-sub{font-size:11px;color:#7a7a72;margin-top:.4rem}
table{width:100%;border-collapse:collapse}
th{padding:9px 1rem;text-align:left;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:#7a7a72;border-bottom:1px solid rgba(14,14,12,0.12);background:#f3f0e8;font-weight:500}
td{padding:9px 1rem;font-size:13px;border-bottom:1px solid rgba(14,14,12,0.12)}
.badge{font-size:10px;padding:3px 8px;font-weight:500;letter-spacing:0.05em}
.badge-pub{background:rgba(15,110,86,0.1);color:#0F6E56}
.badge-draft{background:rgba(136,135,128,0.12);color:#5F5E5A}
.badge-red{background:#f5ede9;color:#c8401e}
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0e0e0c;color:#fff;padding:12px 20px;font-size:13px;font-weight:500;display:none;z-index:999}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center}
#login .box{width:360px;background:#fff;border:1px solid rgba(14,14,12,0.12);padding:2.5rem}
#app{display:none;flex-direction:column;min-height:100vh}
#topbar{height:52px;background:#fff;border-bottom:1px solid rgba(14,14,12,0.12);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:50}
#shell{display:flex;flex:1}
#sidebar{width:190px;background:#fff;border-right:1px solid rgba(14,14,12,0.12);padding:1rem 0;flex-shrink:0;min-height:calc(100vh - 52px)}
.nav-section{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#7a7a72;padding:0 1rem;margin:1rem 0 0.4rem}
.nav-item{padding:7px 1rem;font-size:13px;cursor:pointer;border-left:2px solid transparent}
.nav-item:hover{background:#f3f0e8}
.nav-item.active{color:#c8401e;background:#f5ede9;border-left-color:#c8401e;font-weight:500}
#content{flex:1;padding:2rem;overflow:auto}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid rgba(14,14,12,0.12)}
.mono{font-family:'DM Mono',monospace}
.err-box{margin-top:.75rem;background:#fff0ed;border:1px solid rgba(200,64,30,0.3);color:#c8401e;font-size:12px;padding:10px 12px}
.section-sub{font-size:11px;letter-spacing:0.05em;text-transform:uppercase;color:#3a3a36;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid rgba(14,14,12,0.12);font-weight:500}

<script>
// \u2500\u2500 SHA-256 (pure JS, no Web Crypto) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function sha256(s){
  function r(n,t){return n>>>t|n<<32-t}
  function a(a,b,c,d){return(a+b+c+d)&0xFFFFFFFF}
  const H=[1779033703,3144134277,1013904242,2773480762,1359893119,2600822924,528734635,1541459225];
  const K=[1116352408,1899447441,3049323471,3921009573,961987163,1508970993,2453635748,2870763221,3624381080,310598401,607225278,1426881987,1925078388,2162078206,2614888103,3248222580,3835390401,4022224774,264347078,604807628,770255983,1249150122,1555081692,1996064986,2554220882,2821834349,2952996808,3210313671,3336571891,3584528711,113926993,338241895,666307205,773529912,1294757372,1396182291,1695183700,1986661051,2177026350,2456956037,2730485921,2820302411,3259730800,3345764771,3516065817,3600352804,4094571909,275423344,430227734,506948616,659060556,883997877,958139571,1322822218,1537002063,1747873779,1955562222,2024104815,2227730452,2361852424,2428436474,2756734187,3204031479,3329325298];
  let c=[];
  for(let i=0;i<s.length;i++){const b=s.charCodeAt(i);if(b<128)c.push(b);else if(b<2048)c.push(192|b>>6,128|b&63);else c.push(224|b>>12,128|b>>6&63,128|b&63);}
  const l=c.length*8;c.push(128);
  while(c.length%64!==56)c.push(0);
  c.push(0,0,0,0,(l>>>24)&255,(l>>>16)&255,(l>>>8)&255,l&255);
  let hh=[...H];
  for(let i=0;i<c.length;i+=64){
    const w=[];
    for(let j=0;j<16;j++)w.push(c[i+j*4]<<24|c[i+j*4+1]<<16|c[i+j*4+2]<<8|c[i+j*4+3]);
    for(let j=16;j<64;j++){const s1=r(w[j-2],17)^r(w[j-2],19)^w[j-2]>>>10;const s0=r(w[j-15],7)^r(w[j-15],18)^w[j-15]>>>3;w.push(a(s1,w[j-7],s0,w[j-16]));}
    let[A,B,C,D,E,F,G,HH]=[...hh];
    for(let j=0;j<64;j++){const S1=r(E,6)^r(E,11)^r(E,25);const ch=E&F^~E&G;const t1=a(HH,S1,ch,a(K[j],w[j],0,0));const S0=r(A,2)^r(A,13)^r(A,22);const maj=A&B^A&C^B&C;const t2=a(S0,maj,0,0);HH=G;G=F;F=E;E=a(D,t1,0,0);D=C;C=B;B=A;A=a(t1,t2,0,0);}
    hh=hh.map((v,i)=>a(v,[A,B,C,D,E,F,G,HH][i],0,0));
  }
  return hh.map(v=>(v>>>0).toString(16).padStart(8,'0')).join('');
}

// \u2500\u2500 Credentials (hashed) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const EH="0dd6e6abc466574edd69c9422d79f5fd269f621b5b5caabd35e00628873469d8";
const PH="e85608a8d9888ef66a9fde4f6194a2ece6e2d79b5277397b76630ed4ff3ead83";

// \u2500\u2500 Users store \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function loadUsers(){try{const r=localStorage.getItem(UK);if(r)return JSON.parse(r);}catch(e){}return[];}
function saveUsers(u){localStorage.setItem(UK,JSON.stringify(u));}
let USERS=loadUsers();
let CURRENT_USER=null;
function can(action){
  const role=CURRENT_USER?CURRENT_USER.role:'none';
  if(role==='superadmin')return true;
  if(action==='write_draft')return role==='editor'||role==='contributor';
  if(action==='publish')return role==='editor';
  return false;
}
// \u2500\u2500 Session \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function getSession(){try{return JSON.parse(localStorage.getItem(SK));}catch(e){return null;}}
function setSession(user){localStorage.setItem(SK,JSON.stringify(user));}
function clearSession(){localStorage.removeItem(SK);}

  ],
  research:[
    {id:"ai-infrastructure-monitoring",title:"A Framework for Using AI-Enabled Infrastructure Monitoring as a Public Health Intervention",author:"Khahlil Louisy",affiliation:"Harvard Bloomberg Center",tag:"Data-Smart City Solutions",status:"published",date:"June 9, 2026",excerpt:"A method for cities to transform infrastructure monitoring into actionable public health strategy.",body:"Cities face a growing tension: aging infrastructure and limited budgets demand triage...",featured:true},
    {id:"equity-gaps-urban-health",title:"Can AI Address Equity Gaps in Urban Health Surveillance? Evidence from Boston",author:"Khahlil Louisy",affiliation:"Working Paper",tag:"Urban Analytics",status:"published",date:"June 5, 2026",excerpt:"Boston's 311 complaint system vs. AI-detected pavement data reveals equity gaps.",body:"Urban health surveillance systems rely heavily on voluntary citizen reporting...",featured:true},
    {id:"residents-vs-algorithms",title:"When Residents and Algorithms See Different Problems",author:"Khahlil Louisy",affiliation:"The Public Innovation Institute",tag:"Infrastructure Equity",status:"published",date:"May 28, 2026",excerpt:"Analysis of 187,000 citizen reports and 5,000 computer vision detections in Boston.",body:"When a pothole appears on a Boston street, two things may or may not happen...",featured:true},

function loadData(){
  try{
    const r=localStorage.getItem(DK);
    if(r){const p=JSON.parse(r);return Object.assign({},DD,p,{research:p.research||DD.research,programs:p.programs||DD.programs,carousel:p.carousel||DD.carousel,hyperion:Object.assign({},DD.hyperion,p.hyperion||{}),site:Object.assign({},DD.site,p.site||{})});}
  }catch(e){}
  return JSON.parse(JSON.stringify(DD));
}
function saveData(d){localStorage.setItem(DK,JSON.stringify(d));}

let DATA=loadData();
let PAGE="dashboard";

// \u2500\u2500 Auth \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function doLogin(){
  const email=document.getElementById('l-email').value.trim().toLowerCase();
  const pw=document.getElementById('l-pw').value;
  const eHash=sha256(email);
  const pHash=sha256(pw);
  if(eHash===EH&&pHash===PH){
    const user={id:'superadmin',name:'Khahlil Louisy',email,role:'superadmin'};
    CURRENT_USER=user;setSession(user);
    document.getElementById('l-err').style.display='none';showApp();return;
  }
  USERS=loadUsers();
  const match=USERS.find(u=>u.active&&u.emailHash===eHash&&u.pwHash===pHash);
  if(match){
    CURRENT_USER={id:match.id,name:match.name,email:match.email,role:match.role};
    setSession(CURRENT_USER);
    document.getElementById('l-err').style.display='none';showApp();return;
  }
  document.getElementById('l-err').style.display='block';
}
document.getElementById('l-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('l-pw').focus();});
document.getElementById('l-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogout(){clearSession();location.reload();}

function showApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  // Update topbar name
  const nameEl=document.getElementById('topbar-name');
  if(nameEl&&CURRENT_USER){
    const roleLabel={superadmin:'Superadmin',editor:'Editor',contributor:'Contributor'}[CURRENT_USER.role]||CURRENT_USER.role;
    nameEl.textContent=CURRENT_USER.name+' \u00b7 '+roleLabel;
  }
  rebuildSidebar();
  nav('dashboard');
}
function rebuildSidebar(){
  const sb=document.getElementById('sidebar');
  const isSA=CURRENT_USER&&CURRENT_USER.role==='superadmin';
  const canSite=can('manage_site');
  sb.innerHTML=`
    <div class="nav-section">Overview</div>
    <div class="nav-item" onclick="nav('dashboard')">Dashboard</div>
    <div class="nav-section">Content</div>
    <div class="nav-item" onclick="nav('research')">Research</div>
    <div class="nav-item" onclick="nav('programs')">Programs</div>
    ${isSA?`
    <div class="nav-item" onclick="nav('carousel')">Carousel</div>
    <div class="nav-item" onclick="nav('hyperion')">Hyperion</div>

// \u2500\u2500 Toast \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}

// \u2500\u2500 Save \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function save(){saveData(DATA);toast('Saved \u2713');}

// \u2500\u2500 Nav \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function nav(pg){
  PAGE=pg;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.getAttribute('onclick')===`nav('${pg}')`);
  });

// \u2500\u2500 Field helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function field(label,val,onchange,rows){
  return `<div class="field"><label>${label}</label>${rows?`<textarea rows="${rows}" onchange="${onchange}">${esc(val||'')}</textarea>`:`<input type="text" value="${esc(val||'')}" onchange="${onchange}">`}</div>`;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function badge(status){return `<span class="badge ${status==='published'||status==='open'?'badge-pub':'badge-draft'}">${status}</span>`;}

// \u2500\u2500 Render \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function render(){
  const c=document.getElementById('content');
  if(PAGE==='dashboard') c.innerHTML=renderDashboard();
  else if(PAGE==='research') c.innerHTML=renderResearch();
  else if(PAGE==='programs') c.innerHTML=renderPrograms();
  else if(PAGE==='carousel') c.innerHTML=renderCarousel();
  else if(PAGE==='hyperion') c.innerHTML=renderHyperion();
  else if(PAGE==='conference') c.innerHTML=renderConference();
  else if(PAGE==='focus') c.innerHTML=renderFocus();
  else if(PAGE==='stats') c.innerHTML=renderStats();
  else if(PAGE==='settings') c.innerHTML=renderSettings();
  else if(PAGE==='users') c.innerHTML=renderUsers();
}

// \u2500\u2500 User Management \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderUsers(){
  if(!can('manage_users')) return '<div class="card"><p style="color:#c8401e">Access denied.</p></div>';
  const roleBadge=r=>({superadmin:'<span class="badge" style="background:#0e0e0c;color:#fff">Superadmin</span>',editor:'<span class="badge badge-pub">Editor</span>',contributor:'<span class="badge badge-draft">Contributor</span>'}[r]||r);
  return `
    <div class="section-header">
      <div><h1>User Management</h1><div style="font-size:12px;color:#7a7a72;margin-top:4px">Manage team access and roles</div></div>
    </div>

    <!-- Role summary -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem">
      <div class="card" style="border-left:3px solid #0e0e0c">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#7a7a72;margin-bottom:.4rem">Superadmin</div>
        <div style="font-size:13px;color:#0e0e0c;line-height:1.6">Full access to all content, site settings, and user management.</div>
      </div>
      <div class="card" style="border-left:3px solid #0F6E56">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#7a7a72;margin-bottom:.4rem">Editor</div>
        <div style="font-size:13px;color:#0e0e0c;line-height:1.6">Can create, edit, and publish research and programs. No site settings or user access.</div>
      </div>
      <div class="card" style="border-left:3px solid #7a7a72">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#7a7a72;margin-bottom:.4rem">Contributor</div>
        <div style="font-size:13px;color:#0e0e0c;line-height:1.6">Can create and edit drafts only. Cannot publish. No site settings or user access.</div>
      </div>
    </div>

    <!-- Current users -->
    <div class="card" style="margin-bottom:1.5rem">
      <div class="section-sub">Team Members</div>
      <!-- Superadmin (hardcoded, cannot be edited) -->
      <div style="display:flex;justify-content:space-between;align-items:center;padding:.85rem 0;border-bottom:1px solid rgba(14,14,12,0.12)">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:34px;height:34px;background:#0e0e0c;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0">KL</div>
          <div>
            <div style="font-size:13px;font-weight:500">Khahlil Louisy</div>
            <div style="font-size:11px;color:#7a7a72">khahlil.louisy@gmail.com</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${roleBadge('superadmin')}
          <span style="font-size:11px;color:#7a7a72;font-style:italic">Hardcoded</span>
        </div>
      </div>
      ${USERS.map((u,i)=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:.85rem 0;border-bottom:1px solid rgba(14,14,12,0.12)">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:34px;height:34px;background:${u.active?'#3a3a36':'#ccc'};border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0">${u.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>
          <div>
            <div style="font-size:13px;font-weight:500">${esc(u.name)}</div>
            <div style="font-size:11px;color:#7a7a72">${esc(u.email)}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${roleBadge(u.role)}
          <span class="badge ${u.active?'badge-pub':'badge-draft'}">${u.active?'Active':'Suspended'}</span>
          <select onchange="updateUser(${i},'role',this.value)" style="width:auto;padding:4px 8px;font-size:12px">
            <option ${u.role==='editor'?'selected':''} value="editor">Editor</option>
            <option ${u.role==='contributor'?'selected':''} value="contributor">Contributor</option>
          </select>
          <button class="btn-ghost" style="font-size:11px;padding:5px 10px" onclick="toggleUser(${i})">${u.active?'Suspend':'Activate'}</button>
          <button class="btn-danger" onclick="deleteUser(${i})">Remove</button>
        </div>
      </div>`).join('')}
      ${USERS.length===0?'<div style="font-size:13px;color:#7a7a72;padding:1rem 0">No team members added yet.</div>':''}
    </div>

    <!-- Add new user -->
    <div class="card">
      <div class="section-sub">Add Team Member</div>
      <div class="grid2">
        <div class="field"><label>Full Name</label><input type="text" id="nu-name" placeholder="Jane Smith"></div>
        <div class="field"><label>Email Address</label><input type="email" id="nu-email" placeholder="jane@example.com"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Temporary Password</label><input type="password" id="nu-pw" placeholder="They should change this"><div style="font-size:11px;color:#7a7a72;margin-top:4px">Share this with them securely. They cannot change it themselves in the CMS.</div></div>
        <div class="field"><label>Role</label><select id="nu-role" style="width:100%"><option value="contributor">Contributor</option><option value="editor">Editor</option></select></div>
      </div>
      <button class="btn" onclick="addUser()">Add Team Member</button>
      <div id="nu-err" style="display:none;margin-top:.75rem" class="err-box"></div>
    </div>`;
}

function addUser(){
  const name=document.getElementById('nu-name').value.trim();
  const email=document.getElementById('nu-email').value.trim().toLowerCase();
  const pw=document.getElementById('nu-pw').value;
  const role=document.getElementById('nu-role').value;
  const errEl=document.getElementById('nu-err');
  if(!name||!email||!pw){errEl.textContent='Please fill in all fields.';errEl.style.display='block';return;}
  if(pw.length<6){errEl.textContent='Password must be at least 6 characters.';errEl.style.display='block';return;}
  if(sha256(email)===EH){errEl.textContent='That email is already in use.';errEl.style.display='block';return;}
  if(USERS.find(u=>u.email===email)){errEl.textContent='A user with that email already exists.';errEl.style.display='block';return;}
  USERS.push({id:'u-'+Date.now(),name,email,emailHash:sha256(email),pwHash:sha256(pw),role,active:true});
  saveUsers(USERS);
  errEl.style.display='none';
  toast('Team member added \u2713');
  render();
}
function updateUser(i,k,v){USERS[i][k]=v;saveUsers(USERS);toast('Updated \u2713');}
function toggleUser(i){USERS[i].active=!USERS[i].active;saveUsers(USERS);toast((USERS[i].active?'Activated':'Suspended')+' \u2713');render();}
function deleteUser(i){if(confirm('Remove '+USERS[i].name+'? They will lose access immediately.')){USERS.splice(i,1);saveUsers(USERS);toast('Removed \u2713');render();}}

// \u2500\u2500 Image upload \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function uploadImage(i, input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 600000){ alert('Image is too large. Please use an image under 500KB.'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = function(e){
    DATA.research[i].image = e.target.result;
    save();
    render();
  };
  reader.readAsDataURL(file);
}
