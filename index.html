  site:{name:"The Public Innovation Institute",email:"info@thepii.org",tagline:"Working at the intersection of technology, public policy, and community leadership.",address:"1 Washington Mall, Suite 1159\nGovernment Center, Boston, MA 02108",twitter:"@thepii_org",pullQuote:'"The world doesn\'t move in straight lines. A child\'s health is shaped by the air they breathe, the school they attend, the code behind a distant algorithm."'},

    {id:2,tag:"Working Paper · Urban Analytics",title:"Can AI Address Equity Gaps in Urban Health Surveillance?",sub:"Evidence from Boston's 311 system and AI-detected pavement data reveals new fault lines in civic participation.",link:"research/equity-gaps-urban-health",status:"active"},
    {id:3,tag:"Program · Applications Close June 22",title:"PII × Cyvl.AI 2026 Summer Innovation Program",sub:"Six weeks at the intersection of AI, infrastructure data, and urban policy. Fully virtual.",link:"programs/piixcyvl-2026",status:"active"}
  ],
  research:[
    {id:"ai-infrastructure-monitoring",title:"A Framework for Using AI-Enabled Infrastructure Monitoring as a Public Health Intervention",author:"Khahlil Louisy",affiliation:"Harvard Bloomberg Center",tag:"Data-Smart City Solutions",status:"published",date:"June 9, 2026",excerpt:"A method for cities to transform infrastructure monitoring into actionable public health strategy, prioritizing repairs where they're needed most while reducing health disparities.",body:"Cities face a growing tension: aging infrastructure and limited budgets demand triage, yet the systems we use to prioritize repairs often reflect who complains rather than who suffers most.\n\n**Stage 1: Multi-modal data fusion.** Integrate 311 complaint data, computer vision pavement assessments, environmental sensor readings, and health outcome data by census tract.\n\n**Stage 2: Equity-weighted prioritization.** Standard infrastructure triage weights severity of damage. This framework adds a second axis: the health vulnerability of the population affected.\n\n**Stage 3: Feedback loop design.** Deploy repair crews with structured outcome-collection protocols. Track whether completed repairs correlate with measurable changes in emergency department utilization.\n\n**Stage 4: Continuous calibration.** Use the feedback data to retrain prioritization models quarterly, improving the correlation between AI-detected issues and health impact over time.\n\nPilot data from Boston suggests that applying this framework could shift roughly 22% of annual infrastructure repair spending toward historically underserved neighborhoods — without increasing total expenditure.",featured:true},
    {id:"equity-gaps-urban-health",title:"Can AI Address Equity Gaps in Urban Health Surveillance? Evidence from Boston",author:"Khahlil Louisy",affiliation:"Working Paper",tag:"Urban Analytics",status:"published",date:"June 5, 2026",excerpt:"Boston's 311 complaint system vs. AI-detected pavement data reveals how complaint-based systems reflect socioeconomic patterns of participation.",body:"Urban health surveillance systems in the United States rely heavily on voluntary citizen reporting. The 311 non-emergency service request system is the primary mechanism by which residents signal infrastructure problems to government. But who reports, and who doesn't, is not random.\n\nThis paper examines 187,408 pavement-related 311 service requests filed in Boston between 2021 and 2024, cross-referencing them against 5,341 computer vision detections of pavement degradation generated by the Cyvl.AI platform. The overlap is 7.9%.\n\n**Key finding:** The 92.1% of AI-detected issues not captured by 311 reports are disproportionately concentrated in neighborhoods with lower median incomes, higher proportions of non-English-speaking residents, and higher rates of chronic disease.\n\nAI-based detection offers a pathway to complaint-independent surveillance. But deploying AI detection without addressing the equity question in prioritization simply replaces one biased input with a more efficient one.",featured:true},
    {id:"residents-vs-algorithms",title:"When Residents and Algorithms See Different Problems",author:"Khahlil Louisy",affiliation:"The Public Innovation Institute",tag:"Infrastructure Equity",status:"published",date:"May 28, 2026",excerpt:"Analysis of 187,000 citizen reports and 5,000 computer vision detections in Boston raises critical questions about who gets heard in civic data systems.",body:"When a pothole appears on a Boston street, two things may or may not happen: a resident may file a 311 report, and a computer vision system may detect it. These two detection events are far less correlated than city planners assume.\n\nThis analysis maps the spatial and demographic patterns of the gap between resident-reported and algorithmically-detected pavement issues across Boston's 23 neighborhoods.\n\nThe divergence matters because cities typically use 311 data as one input into maintenance scheduling. If the AI detection layer is added as a supplement rather than a correction, the equity gap may actually widen.\n\nThe paper concludes with three design recommendations: (1) treat AI detection as a bias-correcting input, not a neutral supplement; (2) publish equity audits of repair allocation annually; (3) create community feedback mechanisms.",featured:true},
    {id:"transportation-safety-build-act",title:"The BUILD America 250 Act: A Missed Opportunity for Safety-First Infrastructure",author:"Khahlil Louisy, Eric Plosky, Giovanni Pintor",affiliation:"Issues in Science and Technology",tag:"Policy Brief",status:"published",date:"April 2026",excerpt:"A critical analysis of the BUILD America 250 Act's transportation safety provisions and what a performance-based alternative would look like.",body:"The BUILD America 250 Act represents the largest single federal infrastructure investment since 2021. Yet its transportation safety provisions repeat the same structural mistakes that have kept American road fatality rates among the highest in the developed world.\n\nThis article argues that the Act's safety provisions are process-oriented rather than outcome-oriented. They require states to develop safety plans and report on activities. They do not require measurable reductions in fatalities as a condition of continued funding.\n\nWe propose a Vision Zero federal funding mechanism that ties a portion of highway formula funding to verified reductions in fatality rates.",featured:false}
  ],
  programs:[
    {id:"piixcyvl-2026",name:"PII × Cyvl.AI 2026 Summer Innovation Program",level:"Featured",format:"Fully virtual · 6 weeks",status:"open",deadline:"June 22, 2026",applyUrl:"#",featured:true,description:"Six weeks of hands-on work at the intersection of AI, infrastructure data, and urban policy. A select cohort of students and recent grads tackle real city challenges with real datasets.",fullDescription:"The PII × Cyvl.AI Summer Innovation Program is a six-week intensive for students and recent graduates who want to work at the frontier of AI and urban infrastructure.\n\nParticipants will work directly with Cyvl.AI's computer vision infrastructure dataset alongside public health data, 311 records, and municipal budget data from partner cities.\n\n**What you'll do:**\n- Work in small teams on a defined research or policy question\n- Learn applied data analysis, geospatial methods, and policy communication\n- Present findings to city officials, researchers, and practitioners\n- Receive mentorship from The PII's research team and Cyvl.AI engineers\n\n**Timeline:**\n- Applications close: June 22, 2026\n- Program runs: July 7 – August 15, 2026\n- Final showcase: August 14, 2026"},
    {id:"data-social-innovation",name:"Data, Social Innovation & Public Policy",level:"Graduate",format:"Summer intensive",status:"open",deadline:"TBD",applyUrl:"#",featured:false,description:"Rigorous training for graduate students and practitioners at the intersection of data science and public policy reform.",fullDescription:"This graduate-level program prepares students to work at the intersection of data science and public policy. Over six weeks, participants develop applied skills in data analysis, policy design, and stakeholder communication.\n\nThe program draws faculty from Harvard Kennedy School, MIT, and The PII's research network."},
    {id:"data-analytics-urban-policy",name:"Data Analytics & Urban Policy",level:"Undergraduate",format:"Fully virtual · 6 weeks",status:"open",deadline:"TBD",applyUrl:"#",featured:false,description:"Hands-on training in urban data analytics with direct application to real city challenges and municipal data infrastructure.",fullDescription:"Designed for undergraduate students interested in how cities work and how data can make them work better. This program covers the fundamentals of urban data — what cities collect, how it's structured, and how to analyze it.\n\nNo prior programming experience required. Students leave with practical skills in Python, data visualization, and policy brief writing."},

  conference:{year:"2026",date:"May 2026",location:"New York City",theme:"Urban.Next: Inventing the Future of Urban Systems",subtitle:"The conference on public-interest innovation and invention. Bringing together researchers, city leaders, technologists, and civic entrepreneurs.",regUrl:"#",tracks:[{name:"The Summit",desc:"Plenaries, keynotes, and provocations from the field's leading voices"},{name:"The Workshops",desc:"Hands-on sessions co-designed with city innovators and practitioners"}]},
  cailPosts:[
    {id:"cail-launch-2026",type:"article",title:"Launching City as Innovation Lab: Our Vision for Urban Testbeds",author:"Khahlil Louisy",date:"June 19, 2026",status:"published",excerpt:"CAIL is PII\u2019s new initiative to partner with cities and companies to design, test, and scale solutions in real-world urban environments.",body:"Cities are no longer just the subjects of innovation \u2014 they are its laboratories.\n\nToday, The Public Innovation Institute formally launches City as Innovation Lab (CAIL), an initiative designed to turn cities into structured testbeds where new solutions are co-developed with civic leaders, tested against real problems, evaluated rigorously, and scaled across city networks.\n\nUrban challenges \u2014 climate resilience, infrastructure modernization, digital transformation, public health, mobility \u2014 require more than good ideas. They demand real-world testing, robust research, and cross-sector collaboration.\n\n**What CAIL does:**\n- Partners cities with companies and researchers to deploy pilots\n- Measures outcomes with independent, rigorous evaluation\n- Builds governance and financing pathways for long-term adoption\n- Shares lessons across a global network of participating cities\n\nIf you are a city leader, company, or research organization interested in participating, we\u2019d love to hear from you.",featured:true},
    {id:"cail-forum-sept-2026",type:"event",title:"CAIL Urban Innovation Forum \u2014 September 2026",author:"The PII",date:"September 15, 2026",status:"published",excerpt:"A half-day convening for city leaders, companies, and researchers exploring the future of urban testbeds. Cambridge, MA.",body:"Join us for the inaugural CAIL Urban Innovation Forum, a half-day convening at the intersection of civic need and private sector innovation.\n\n**Date:** September 15, 2026\n**Location:** Harvard Kennedy School, Cambridge, MA\n**Format:** Panels, roundtables, and working sessions\n\nThe forum will bring together city CIOs, innovation officers, technology companies, and researchers to explore how cities can structure innovation partnerships that actually deliver measurable outcomes.\n\n**Agenda highlights:**\n- Opening keynote: The city as a platform for public-interest innovation\n- Panel: Lessons from the first generation of civic AI deployments\n- Roundtable: What cities need from companies (and vice versa)\n- Workshop: Designing a pilot that\u2019s built to scale\n\nRegistration opens July 2026. Contact info@thepii.org to express interest.",featured:true}

function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      return {...DEFAULT_DATA,...parsed,
        research:parsed.research||DEFAULT_DATA.research,
        programs:parsed.programs||DEFAULT_DATA.programs,
        carousel:parsed.carousel||DEFAULT_DATA.carousel,
        cailPosts:parsed.cailPosts||DEFAULT_DATA.cailPosts,
        hyperion:{...DEFAULT_DATA.hyperion,...(parsed.hyperion||{})},
        site:{...DEFAULT_DATA.site,...(parsed.site||{})}
      };
    }
  }catch(e){}
  return DEFAULT_DATA;
}

function Ticker({items}){
  const doubled=[...items,...items];
  return h("div",{style:{background:INK,padding:"11px 0",overflow:"hidden",whiteSpace:"nowrap"}},
    h("style",null,"@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}"),
    h("div",{style:{display:"inline-block",animation:"tick 32s linear infinite"}},
      doubled.map((item,i)=>h("span",{key:i},
        h("span",{style:{display:"inline-block",fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.6)",marginRight:"2.5rem",fontWeight:500}},item),
        h("span",{style:{display:"inline-block",width:4,height:4,background:ACCENT,borderRadius:"50%",verticalAlign:"middle",marginRight:"2.5rem"}})
      ))
    )
  );
}

function App(){
  const [page,setPage]=useState("home");
  const [data,setData]=useState(()=>loadData());

  // Listen for storage changes (CMS updates in same browser)
  useEffect(()=>{
    const handler=e=>{if(e.key===STORAGE_KEY)setData(loadData());};
    window.addEventListener("storage",handler);
    return()=>window.removeEventListener("storage",handler);
  },[]);

  const go=pg=>{window.scrollTo&&window.scrollTo(0,0);setPage(pg);};
  const [rootPage,subId]=page.split("/");
  const article=rootPage==="research"&&subId?data.research.find(r=>r.id===subId):null;
  const program=rootPage==="programs"&&subId?data.programs.find(p=>p.id===subId):null;
  const cailPost=rootPage==="cail"&&subId?(data.cailPosts||[]).find(p=>p.id===subId):null;

  return h("div",{style:{background:PAPER,minHeight:"100vh"}},
    h(Nav,{page:rootPage==="cail"||rootPage==="hyperion"?"initiatives":rootPage,setPage:go,data}),
    rootPage==="home"&&h(HomePage,{data,setPage:go}),
    rootPage==="research"&&!subId&&h(ResearchPage,{data,setPage:go}),
    rootPage==="research"&&subId&&h(ArticlePage,{article,setPage:go,data}),
    rootPage==="programs"&&!subId&&h(ProgramsPage,{data,setPage:go}),
    rootPage==="programs"&&subId&&h(ProgramDetail,{program,setPage:go}),
    rootPage==="hyperion"&&h(HyperionPage,{data}),
    rootPage==="cail"&&!subId&&h(CAILPage,{data,setPage:go}),
    rootPage==="cail"&&subId&&h(CAILPostPage,{post:cailPost,setPage:go}),
    rootPage==="conference"&&h(ConferencePage,{data}),
    rootPage==="about"&&h(AboutPage,{data,setPage:go}),
    rootPage==="contact"&&h(ContactPage,{data}),
    rootPage!=="home"&&h("div",{style:{borderTop:`1px solid ${RULE}`}}),
    h(Footer,{data,setPage:go})
  );
}

ReactDOM.createRoot(document.getElementById("pii-root")).render(h(App));
</script>
